name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assemble static site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp _headers dist/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create the Pages project on first run; ignore "already exists" on later runs.
          npx --yes wrangler@latest pages project create sigma-cms \
            --production-branch=main || echo "Project already exists, continuing."
          npx --yes wrangler@latest pages deploy dist \
            --project-name=sigma-cms --branch=main
